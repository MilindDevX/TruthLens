server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── SPA Fallback ───
    # All routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static Assets (hashed by Vite — cache aggressively) ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── API Reverse Proxy ───
    # Frontend calls /api/v1/* which Nginx proxies to the backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML inference (can be slow)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── Health endpoint proxy ───
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Disable server tokens ───
    server_tokens off;

    # ─── Error pages ───
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
